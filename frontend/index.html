<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mini API Dashboard</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
    h1 { color: #333; }
    .card { background: #f5f5f5; border-radius: 8px; padding: 16px; margin: 12px 0; }
    .label { font-weight: bold; color: #555; }
    .value { color: #222; margin-top: 4px; }
    .ok { color: green; }
    .error { color: red; }
  </style>
</head>
<body>
  <h1>Mini API Dashboard</h1>

  <div class="card">
    <div class="label">Health</div>
    <div class="value" id="health">loading...</div>
  </div>

  <div class="card">
    <div class="label">Version</div>
    <div class="value" id="version">loading...</div>
  </div>

  <div class="card">
    <div class="label">Database</div>
    <div class="value" id="db">loading...</div>
  </div>

  <div class="card">
    <div class="label">Cache (request count)</div>
    <div class="value" id="cache">loading...</div>
  </div>

  <script>
    const API = '/api';

    async function fetchAll() {
      const endpoints = ['health', 'version', 'db', 'cache'];
      for (const ep of endpoints) {
        try {
          const res = await fetch(`${API}/${ep}`);
          const data = await res.json();
          document.getElementById(ep).textContent = JSON.stringify(data);
          document.getElementById(ep).className = 'value ok';
        } catch (e) {
          document.getElementById(ep).textContent = 'error';
          document.getElementById(ep).className = 'value error';
        }
      }
    }

    fetchAll();
    setInterval(fetchAll, 5000);
  </script>
</body>
</html>
