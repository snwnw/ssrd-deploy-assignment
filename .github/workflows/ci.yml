name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  lint:
    name: Lint
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run linter
        run: docker compose run --rm api ruff check . --no-cache

  test:
    name: Unit tests
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run tests
        run: docker compose run --rm api pytest

  build-and-push:
    name: Build and Push Docker image
    needs: [ lint, test ]
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.set-tag.outputs.image_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: set-tag
        run: |
          echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV
          echo "image_tag=${GITHUB_SHA}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            APP_VERSION=${{ github.sha }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/ssrd-api:${{ env.IMAGE_TAG }}
            ghcr.io/${{ github.repository_owner }}/ssrd-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to Staging
    needs: build-and-push
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to staging
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          KUBECONFIG: ${{ secrets.KUBECONFIG_STAGING }}
        run: |
          kubectl set image deployment/mini-api \
            mini-api=ghcr.io/${{ github.repository_owner }}/ssrd-api:${IMAGE_TAG} \
            -n staging

      - name: Check rollout status
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG_STAGING }}
        run: kubectl rollout status deployment/mini-api -n staging --timeout=120s

      - name: Rollback on failure
        if: failure()
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG_STAGING }}
        run: |
          echo "Deployment failed - rolling back..."
          kubectl rollout undo deployment/mini-api -n staging

  deploy-production:
    name: Deploy to Production
    needs: deploy-staging
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to production
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          KUBECONFIG: ${{ secrets.KUBECONFIG_PROD }}
        run: |
          kubectl set image deployment/mini-api \
            mini-api=ghcr.io/${{ github.repository_owner }}/ssrd-api:${IMAGE_TAG} \
            -n production

      - name: Check rollout status
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG_PROD }}
        run: kubectl rollout status deployment/mini-api -n production --timeout=120s

      - name: Rollback on failure
        if: failure()
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG_PROD }}
        run: |
          echo "Production deployment failed - rolling back..."
          kubectl rollout undo deployment/mini-api -n production
